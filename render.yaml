services:
  - type: web
    name: ipl-auction-api
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-auction-db
          property: connectionString
      - key: PUBLIC_URL
        value: "" # Set this to your Render URL (e.g., https://api.onrender.com) after deployment to enable keep-alive
      - key: PYTHON_VERSION
        value: 3.11.6

databases:
  - name: ipl-auction-db
    plan: free
